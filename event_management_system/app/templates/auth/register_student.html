{% extends "base.html" %}

{% block title %}Register - Smart Campus{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="card shadow border-0 overflow-hidden">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0 text-center"><i class="fas fa-user-plus"></i> Student Registration</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" id="registration-form">
                        <div class="row">
                            <div class="col-md-12">
                                <h5 class="border-bottom pb-2 mb-3">Login Details</h5>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name *</label>
                                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address *</label>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="example@college.edu" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="password" class="form-label">Password *</label>
                                        <input type="password" class="form-control" id="password" name="password" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="confirm_password" class="form-label">Confirm *</label>
                                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                                    </div>
                                </div>
                                
                                <h5 class="border-bottom pb-2 mb-3 mt-4">Academic Details</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="enrollment_number" class="form-label">Enrollment No. *</label>
                                        <input type="text" class="form-control" id="enrollment_number" name="enrollment_number" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="department" class="form-label">Department</label>
                                        <input type="text" class="form-control" id="department" name="department" placeholder="e.g. CSE">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="cgpa" class="form-label">CGPA</label>
                                        <input type="number" class="form-control" id="cgpa" name="cgpa" min="0" max="10" step="0.01" value="0">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="attendance" class="form-label">Attendance %</label>
                                        <input type="number" class="form-control" id="attendance" name="attendance" min="0" max="100" step="0.01" value="0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top text-center">
                            <button type="submit" id="submit-btn" class="btn btn-success btn-lg px-5 shadow">
                                <i class="fas fa-user-plus"></i> Complete Registration
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Already have an account? 
                        <a href="{{ url_for('auth.login') }}" class="fw-bold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
